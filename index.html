<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="SastiTripsWale — India's #1 travel community. Find travel mates, split expenses, explore India together."
    />
    <meta name="theme-color" content="#0a1220" />
    <link rel="icon" href="/brand/logo-mark.png" />
    <title>SastiTripsWale — Travel Together • Split Expenses</title>
    <script>
      // Apply the persisted theme before first paint (avoids a flash of the
      // wrong theme). Dark is the default when nothing is stored yet.
      (function () {
        try {
          var raw = localStorage.getItem('stw-theme');
          var theme = raw && JSON.parse(raw).state && JSON.parse(raw).state.theme;
          if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
